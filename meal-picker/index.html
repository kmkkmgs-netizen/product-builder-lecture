<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘 뭐 먹지? 🍽️</title>
  <style>
    /* ── CSS 변수 (라이트/다크) ── */
    :root {
      --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --card-bg: #ffffff;
      --card-shadow: 0 10px 40px rgba(0,0,0,0.15);
      --card-shadow-hover: 0 16px 50px rgba(0,0,0,0.2);
      --text-primary: #2d2d2d;
      --text-secondary: #888;
      --text-muted: #aaa;
      --display-bg: #f7f7fb;
      --history-tag-bg: #f0f0f5;
      --history-tag-color: #666;
      --food-card-bg: #ffffff;
      --food-card-border: #eee;
      --benefit-color: #666;
      --section-sub: rgba(255,255,255,0.75);
      --tab-border: rgba(255,255,255,0.5);
      --tab-bg: rgba(255,255,255,0.15);
      --tab-active-color: #5a3e9e;
      --theme-btn-bg: rgba(255,255,255,0.2);
      --theme-btn-color: white;
      --theme-btn-border: rgba(255,255,255,0.5);
    }

    [data-theme="dark"] {
      --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      --card-bg: #1e1e2e;
      --card-shadow: 0 10px 40px rgba(0,0,0,0.4);
      --card-shadow-hover: 0 16px 50px rgba(0,0,0,0.5);
      --text-primary: #e8e8f0;
      --text-secondary: #8888aa;
      --text-muted: #666688;
      --display-bg: #2a2a3e;
      --history-tag-bg: #2a2a3e;
      --history-tag-color: #aaaacc;
      --food-card-bg: #1e1e2e;
      --food-card-border: #3a3a50;
      --benefit-color: #aaaacc;
      --section-sub: rgba(200,200,255,0.6);
      --tab-border: rgba(150,150,255,0.4);
      --tab-bg: rgba(100,100,200,0.2);
      --tab-active-color: #1a1a2e;
      --theme-btn-bg: rgba(255,255,255,0.1);
      --theme-btn-color: #e8e8f0;
      --theme-btn-border: rgba(150,150,255,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      padding: 30px 20px 60px;
      transition: background 0.4s;
    }

    /* ── 헤더 영역 ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 8px;
      position: relative;
    }

    h1 {
      color: white;
      font-size: 2rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .theme-toggle {
      position: absolute;
      right: 0;
      padding: 8px 16px;
      border-radius: 30px;
      border: 1px solid var(--theme-btn-border);
      background: var(--theme-btn-bg);
      color: var(--theme-btn-color);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      backdrop-filter: blur(4px);
    }
    .theme-toggle:hover { background: rgba(255,255,255,0.25); }
    .theme-toggle:active { transform: scale(0.96); }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.8);
      margin-bottom: 36px;
      font-size: 1rem;
    }

    /* ── 랜덤 피커 그리드 ── */
    .picker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
      max-width: 1100px;
      margin: 0 auto 56px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      transition: transform 0.2s, box-shadow 0.2s, background 0.4s;
    }
    .card:hover { transform: translateY(-4px); box-shadow: var(--card-shadow-hover); }

    .card-header {
      padding: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      user-select: none;
      transition: background 0.4s;
    }
    .card-icon { font-size: 2.2rem; line-height: 1; }
    .card-title { font-size: 1.2rem; font-weight: 700; }
    .card-desc { font-size: 0.8rem; color: var(--text-secondary); margin-top: 3px; }
    .card-arrow { margin-left: auto; font-size: 1.1rem; color: var(--text-muted); transition: transform 0.3s; }
    .card.open .card-arrow { transform: rotate(180deg); }

    .card-body { display: none; padding: 0 22px 22px; }
    .card.open .card-body { display: block; }

    .meal-display {
      background: var(--display-bg);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      margin-bottom: 14px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.4s;
    }
    .meal-label { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
    .meal-emoji { font-size: 2rem; margin-bottom: 4px; opacity: 0; transition: opacity 0.3s 0.08s; }
    .meal-emoji.show { opacity: 1; }
    .meal-name {
      font-size: 1.7rem; font-weight: 800; color: var(--text-primary);
      opacity: 0; transform: scale(0.82);
      transition: opacity 0.3s, transform 0.3s, color 0.4s;
    }
    .meal-name.show { opacity: 1; transform: scale(1); }
    .meal-benefit {
      font-size: 0.8rem; color: var(--benefit-color); margin-top: 8px; line-height: 1.55;
      opacity: 0; max-height: 0; overflow: hidden;
      transition: opacity 0.35s 0.15s, max-height 0.4s, color 0.4s;
    }
    .meal-benefit.show { opacity: 1; max-height: 100px; }

    .pick-btn {
      width: 100%; padding: 13px; border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 700; cursor: pointer; color: white;
      letter-spacing: 0.5px; transition: transform 0.1s, filter 0.2s;
    }
    .pick-btn:active { transform: scale(0.97); }
    .pick-btn:hover  { filter: brightness(1.1); }

    /* 카드별 색상 (라이트/다크 공용) */
    .card[data-meal="breakfast"] .card-title { color: #e65100; }
    .card[data-meal="breakfast"] .pick-btn   { background: linear-gradient(135deg,#ff9a56,#ff6b35); }
    .card[data-meal="lunch"]     .card-title { color: #1565c0; }
    .card[data-meal="lunch"]     .pick-btn   { background: linear-gradient(135deg,#56b4ff,#2196f3); }
    .card[data-meal="dinner"]    .card-title { color: #6a1b9a; }
    .card[data-meal="dinner"]    .pick-btn   { background: linear-gradient(135deg,#a056ff,#7c3aed); }
    .card[data-meal="dessert"]   .card-title { color: #ad1457; }
    .card[data-meal="dessert"]   .pick-btn   { background: linear-gradient(135deg,#ff6eb4,#e91e8c); }

    /* 헤더 배경 */
    [data-theme="light"] .card[data-meal="breakfast"] .card-header { background: linear-gradient(90deg,#fff9f0,#fff3e0); }
    [data-theme="light"] .card[data-meal="lunch"]     .card-header { background: linear-gradient(90deg,#f0f9ff,#e0f4ff); }
    [data-theme="light"] .card[data-meal="dinner"]    .card-header { background: linear-gradient(90deg,#f4f0ff,#ede0ff); }
    [data-theme="light"] .card[data-meal="dessert"]   .card-header { background: linear-gradient(90deg,#fff0f6,#ffe0f0); }

    [data-theme="dark"] .card[data-meal="breakfast"] .card-header { background: linear-gradient(90deg,#2a1f12,#3a2010); }
    [data-theme="dark"] .card[data-meal="lunch"]     .card-header { background: linear-gradient(90deg,#0f1e30,#102030); }
    [data-theme="dark"] .card[data-meal="dinner"]    .card-header { background: linear-gradient(90deg,#1e1030,#220e38); }
    [data-theme="dark"] .card[data-meal="dessert"]   .card-header { background: linear-gradient(90deg,#2a1020,#300a1e); }

    .history { margin-top: 14px; }
    .history-title { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 7px; }
    .history-list { display: flex; flex-wrap: wrap; gap: 5px; }
    .history-tag {
      background: var(--history-tag-bg); color: var(--history-tag-color);
      font-size: 0.75rem; padding: 3px 9px; border-radius: 20px;
      transition: background 0.4s, color 0.4s;
    }

    /* ── 전체 메뉴 섹션 ── */
    .all-section { max-width: 1100px; margin: 0 auto; }

    .section-title {
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .section-sub { color: var(--section-sub); font-size: 0.88rem; margin-bottom: 22px; }

    .filter-tabs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .tab-btn {
      padding: 8px 20px;
      border: 1.5px solid var(--tab-border);
      background: var(--tab-bg);
      color: white;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .tab-btn.active, .tab-btn:hover {
      background: white;
      color: var(--tab-active-color);
      border-color: white;
    }

    .all-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }

    .food-card {
      background: var(--food-card-bg);
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, background 0.4s;
      box-shadow: var(--card-shadow);
    }
    .food-card:hover { transform: translateY(-3px); box-shadow: var(--card-shadow-hover); }

    .food-card-top { display: flex; align-items: center; gap: 10px; }
    .food-card-emoji { font-size: 1.8rem; line-height: 1; }
    .food-card-name { font-size: 1rem; font-weight: 700; color: var(--text-primary); transition: color 0.4s; }
    .food-card-cat {
      font-size: 0.7rem; font-weight: 600; padding: 2px 8px;
      border-radius: 10px; margin-top: 3px; display: inline-block;
    }
    .food-card-benefit {
      font-size: 0.78rem; color: var(--benefit-color); line-height: 1.55;
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--food-card-border);
      display: none;
      transition: color 0.4s;
    }
    .food-card.expanded .food-card-benefit { display: block; }

    /* 카테고리 태그 색 */
    [data-theme="light"] .cat-tag-breakfast { background:#fff0e0; color:#e65100; }
    [data-theme="light"] .cat-tag-lunch     { background:#e0f2ff; color:#0d47a1; }
    [data-theme="light"] .cat-tag-dinner    { background:#f0e8ff; color:#5e35b1; }
    [data-theme="light"] .cat-tag-dessert   { background:#ffe0f0; color:#880e4f; }

    [data-theme="dark"] .cat-tag-breakfast { background:#3a2010; color:#ffaa66; }
    [data-theme="dark"] .cat-tag-lunch     { background:#102030; color:#66aaff; }
    [data-theme="dark"] .cat-tag-dinner    { background:#220e38; color:#cc88ff; }
    [data-theme="dark"] .cat-tag-dessert   { background:#300a1e; color:#ff88cc; }

    .food-card[data-cat="breakfast"] .food-card-top { border-left: 3px solid #ff6b35; padding-left: 8px; }
    .food-card[data-cat="lunch"]     .food-card-top { border-left: 3px solid #2196f3; padding-left: 8px; }
    .food-card[data-cat="dinner"]    .food-card-top { border-left: 3px solid #7c3aed; padding-left: 8px; }
    .food-card[data-cat="dessert"]   .food-card-top { border-left: 3px solid #e91e8c; padding-left: 8px; }

    @media (max-width: 600px) {
      h1 { font-size: 1.5rem; }
      .theme-toggle { font-size: 0.75rem; padding: 6px 11px; }
      .picker-grid { grid-template-columns: 1fr; }
      .all-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <h1>오늘 뭐 먹지? 🍽️</h1>
  <button class="theme-toggle" id="themeToggle">🌙 다크모드</button>
</div>
<p class="subtitle">카테고리를 선택하고 버튼을 눌러보세요!</p>

<div class="picker-grid" id="pickerGrid"></div>

<div class="all-section">
  <div class="section-title">📋 전체 메뉴 보기</div>
  <p class="section-sub">음식 카드를 클릭하면 장점을 확인할 수 있어요</p>
  <div class="filter-tabs" id="filterTabs">
    <button class="tab-btn active" data-filter="all">전체</button>
    <button class="tab-btn" data-filter="breakfast">아침식사</button>
    <button class="tab-btn" data-filter="lunch">점심식사</button>
    <button class="tab-btn" data-filter="dinner">저녁식사</button>
    <button class="tab-btn" data-filter="dessert">디저트</button>
  </div>
  <div class="all-grid" id="allGrid"></div>
</div>

  {

      { name: '짜장면',    emoji: '🍝', benefit: '춘장의 된장 발효 성분이 소화를 돕고, 양파와 채소가 풍부해 항산화 효과가 있어요. 포만감이 높아 오후 활동에 활력을 줍니다.' },

/* ── 다크모드 토글 ── */
const html = document.documentElement;
const themeBtn = document.getElementById('themeToggle');
const saved = localStorage.getItem('theme') || 'light';
setTheme(saved);

themeBtn.addEventListener('click', () => {
  setTheme(html.dataset.theme === 'light' ? 'dark' : 'light');
});

function setTheme(t) {
  html.dataset.theme = t;
  localStorage.setItem('theme', t);
  themeBtn.textContent = t === 'dark' ? '☀️ 라이트모드' : '🌙 다크모드';
}

/* ── 랜덤 피커 ── */
const historyMap = {};

function pickRandom(items, current) {
  if (items.length <= 1) return items[0];
  let next;
  do { next = items[Math.floor(Math.random() * items.length)]; }
  while (next.name === current);
  return next;
}

function buildPickerCard(cat) {
  historyMap[cat.id] = [];
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.meal = cat.id;
  card.innerHTML = `
    <div class="card-header">
      <span class="card-icon">${cat.icon}</span>
      <div>
        <div class="card-title">${cat.title}</div>
        <div class="card-desc">${cat.desc}</div>
      </div>
      <span class="card-arrow">▼</span>
    </div>
    <div class="card-body">
      <div class="meal-display">
        <div class="meal-label">추천 메뉴</div>
        <div class="meal-emoji" id="emoji-${cat.id}"></div>
        <div class="meal-name" id="name-${cat.id}">버튼을 눌러보세요</div>
        <div class="meal-benefit" id="benefit-${cat.id}"></div>
      </div>
      <button class="pick-btn" id="btn-${cat.id}">🎲 랜덤 선택!</button>
      <div class="history" id="history-${cat.id}" style="display:none">
        <div class="history-title">이전 선택</div>
        <div class="history-list" id="tags-${cat.id}"></div>
      </div>
    </div>
  `;
  card.querySelector('.card-header').addEventListener('click', () => card.classList.toggle('open'));

  let currentName = null;
  card.querySelector(`#btn-${cat.id}`).addEventListener('click', () => {
    const picked = pickRandom(cat.items, currentName);
    if (currentName && currentName !== picked.name) {
      const h = historyMap[cat.id];
      if (!h.includes(currentName)) { h.unshift(currentName); if (h.length > 5) h.pop(); }
      updateHistory(cat.id);
    }
    currentName = picked.name;

    const nameEl    = document.getElementById(`name-${cat.id}`);
    const emojiEl   = document.getElementById(`emoji-${cat.id}`);
    const benefitEl = document.getElementById(`benefit-${cat.id}`);

    [nameEl, emojiEl, benefitEl].forEach(el => el.classList.remove('show'));
    setTimeout(() => {
      nameEl.textContent    = picked.name;
      emojiEl.textContent   = picked.emoji;
      benefitEl.textContent = picked.benefit;
      [nameEl, emojiEl, benefitEl].forEach(el => el.classList.add('show'));
    }, 110);
  });

  return card;
}

function updateHistory(id) {
  const list = historyMap[id];
  const container = document.getElementById(`history-${id}`);
  const tags = document.getElementById(`tags-${id}`);
  if (!list.length) { container.style.display = 'none'; return; }
  container.style.display = 'block';
  tags.innerHTML = list.map(n => `<span class="history-tag">${n}</span>`).join('');
}

const pickerGrid = document.getElementById('pickerGrid');
categories.forEach(cat => pickerGrid.appendChild(buildPickerCard(cat)));

/* ── 전체 메뉴 ── */
const catNames = { breakfast: '아침식사', lunch: '점심식사', dinner: '저녁식사', dessert: '디저트' };

function buildAllGrid(filter) {
  const allGrid = document.getElementById('allGrid');
  allGrid.innerHTML = '';
  categories.forEach(cat => {
    if (filter !== 'all' && filter !== cat.id) return;
    cat.items.forEach(item => {
      const fc = document.createElement('div');
      fc.className = 'food-card';
      fc.dataset.cat = cat.id;
      fc.innerHTML = `
        <div class="food-card-top">
          <span class="food-card-emoji">${item.emoji}</span>
          <div>
            <div class="food-card-name">${item.name}</div>
            <span class="food-card-cat cat-tag-${cat.id}">${catNames[cat.id]}</span>
          </div>
        </div>
        <div class="food-card-benefit">${item.benefit}</div>
      `;
      fc.addEventListener('click', () => fc.classList.toggle('expanded'));
      allGrid.appendChild(fc);
    });
  });
}

buildAllGrid('all');

document.getElementById('filterTabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildAllGrid(btn.dataset.filter);
});
</script>
