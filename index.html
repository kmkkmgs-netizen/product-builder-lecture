<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘 뭐 먹지?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════
       CSS VARIABLES
    ══════════════════════════════════════ */
    :root {
      --gold:        #c9a84c;
      --gold-light:  #e8d5a0;
      --gold-dim:    #7a6330;
      --trans: 0.4s cubic-bezier(.4,0,.2,1);
    }

    [data-theme="dark"] {
      --bg:          #0e0c0a;
      --bg2:         #161210;
      --surface:     rgba(28, 24, 18, 0.92);
      --surface2:    rgba(36, 31, 23, 0.95);
      --border:      rgba(201,168,76,0.18);
      --border-h:    rgba(201,168,76,0.5);
      --text1:       #f0e9d8;
      --text2:       #a89878;
      --text3:       #5a5040;
      --chip-bg:     rgba(201,168,76,0.1);
      --chip-color:  #c9a84c;
      --divider:     rgba(201,168,76,0.12);
      --shadow:      0 8px 40px rgba(0,0,0,0.6);
      --shadow-h:    0 20px 60px rgba(0,0,0,0.75);
      --inset:       rgba(0,0,0,0.35);
      --glow:        0 0 40px rgba(201,168,76,0.08);
    }

    [data-theme="light"] {
      --bg:          #f5f0e8;
      --bg2:         #ede6d8;
      --surface:     rgba(255,252,245,0.95);
      --surface2:    rgba(252,248,240,0.98);
      --border:      rgba(180,145,80,0.2);
      --border-h:    rgba(180,145,80,0.55);
      --text1:       #1c1710;
      --text2:       #7a6840;
      --text3:       #b8a88a;
      --chip-bg:     rgba(180,145,80,0.1);
      --chip-color:  #8a6820;
      --divider:     rgba(180,145,80,0.15);
      --shadow:      0 6px 30px rgba(120,90,40,0.12);
      --shadow-h:    0 16px 50px rgba(120,90,40,0.2);
      --inset:       rgba(180,145,80,0.06);
      --glow:        0 0 40px rgba(180,145,80,0.06);
    }

    /* ══════════════════════════════════════
       BASE
    ══════════════════════════════════════ */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text1);
      min-height: 100vh;
      transition: background var(--trans), color var(--trans);
      overflow-x: hidden;
    }

    /* noise texture overlay */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: .5;
    }

    .page {
      position: relative; z-index: 1;
      max-width: 1160px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    /* ══════════════════════════════════════
       HEADER
    ══════════════════════════════════════ */
    header {
      text-align: center;
      margin-bottom: 64px;
      position: relative;
    }

    .header-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 20px;
      opacity: .55;
    }
    .ornament-line {
      flex: 1; max-width: 120px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .ornament-line.right {
      background: linear-gradient(90deg, var(--gold), transparent);
    }
    .ornament-diamond {
      width: 6px; height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    .site-title {
      font-family: 'Cormorant Garamond', 'Noto Sans KR', serif;
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text1);
      line-height: 1.1;
      transition: color var(--trans);
    }
    .site-title span {
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .site-sub {
      margin-top: 14px;
      font-size: 0.88rem;
      color: var(--text2);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 300;
      transition: color var(--trans);
    }

    /* theme toggle */
    .theme-toggle {
      position: absolute;
      top: 0; right: 0;
      display: flex; align-items: center; gap: 7px;
      padding: 8px 18px;
      border-radius: 40px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 0.78rem;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background var(--trans);
      backdrop-filter: blur(12px);
    }
    .theme-toggle:hover { border-color: var(--gold); color: var(--gold); }
    .theme-toggle svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }

    /* ══════════════════════════════════════
       SECTION LABEL
    ══════════════════════════════════════ */
    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    .section-header-line {
      flex: 1; height: 1px;
      background: var(--divider);
    }
    .section-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .section-dot {
      width: 4px; height: 4px;
      background: var(--gold);
      border-radius: 50%;
      opacity: .6;
    }

    /* ══════════════════════════════════════
       PICKER CARDS
    ══════════════════════════════════════ */
    .picker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(255px, 1fr));
      gap: 20px;
      margin-bottom: 80px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow), var(--glow);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s, background var(--trans);
      backdrop-filter: blur(16px);
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-h), var(--glow);
      border-color: var(--border-h);
    }

    .card-header {
      padding: 22px 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 16px;
      user-select: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.25s, background 0.25s;
      background: var(--inset);
    }
    .card.open .card-header { border-color: var(--divider); }

    .card-icon { font-size: 2rem; line-height: 1; }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.22rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--gold);
    }
    .card-desc { font-size: 0.75rem; color: var(--text2); margin-top: 2px; letter-spacing: 0.04em; font-weight: 300; }

    .card-arrow {
      margin-left: auto;
      color: var(--text3);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      transition: transform 0.3s, color 0.2s;
    }
    .card.open .card-arrow { transform: rotate(180deg); color: var(--gold); }

    .card-body { display: none; padding: 22px 24px 24px; }
    .card.open .card-body { display: block; }

    /* meal display */
    .meal-display {
      background: var(--inset);
      border: 1px solid var(--divider);
      border-radius: 12px;
      padding: 22px 16px;
      text-align: center;
      margin-bottom: 16px;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background var(--trans);
    }
    .meal-label {
      font-size: 0.65rem;
      color: var(--text3);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 500;
    }
    .meal-emoji {
      font-size: 2.4rem;
      margin-bottom: 6px;
      opacity: 0;
      transition: opacity 0.35s 0.08s;
    }
    .meal-emoji.show { opacity: 1; }

    .meal-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text1);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s, transform 0.3s, color var(--trans);
      letter-spacing: 0.02em;
    }
    .meal-name.show { opacity: 1; transform: translateY(0); }

    .meal-benefit {
      font-size: 0.78rem;
      color: var(--text2);
      margin-top: 10px;
      line-height: 1.65;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity 0.4s 0.18s, max-height 0.4s, color var(--trans);
      padding: 0 4px;
    }
    .meal-benefit.show { opacity: 1; max-height: 120px; }

    /* pick button */
    .pick-btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: 1px solid var(--gold-dim);
      background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
      color: var(--gold-light);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.1s, color 0.2s;
    }
    .pick-btn:hover {
      background: linear-gradient(135deg, rgba(201,168,76,0.28), rgba(201,168,76,0.12));
      border-color: var(--gold);
      color: var(--gold-light);
    }
    .pick-btn:active { transform: scale(0.98); }

    /* history */
    .history { margin-top: 16px; }
    .history-title {
      font-size: 0.65rem;
      color: var(--text3);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .history-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .history-tag {
      background: var(--chip-bg);
      color: var(--chip-color);
      border: 1px solid var(--border);
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.04em;
      transition: background var(--trans), color var(--trans), border-color var(--trans);
    }

    /* ══════════════════════════════════════
       ALL FOOD SECTION
    ══════════════════════════════════════ */
    .all-section { }

    .filter-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .tab-btn {
      padding: 8px 22px;
      border-radius: 40px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .tab-btn:hover { border-color: var(--gold); color: var(--gold); }
    .tab-btn.active {
      border-color: var(--gold);
      background: var(--chip-bg);
      color: var(--gold);
    }

    .all-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 14px;
    }

    .food-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 16px;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s, background var(--trans);
      backdrop-filter: blur(12px);
    }
    .food-card:hover {
      transform: translateY(-3px);
      border-color: var(--border-h);
      box-shadow: var(--shadow-h);
    }

    .food-card-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .food-card-emoji { font-size: 1.9rem; line-height: 1; flex-shrink: 0; }

    .food-card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.08rem;
      font-weight: 700;
      color: var(--text1);
      letter-spacing: 0.02em;
      transition: color var(--trans);
    }
    .food-card-cat {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      padding: 2px 9px;
      border-radius: 20px;
      margin-top: 4px;
      background: var(--chip-bg);
      color: var(--chip-color);
      border: 1px solid var(--border);
      transition: background var(--trans), color var(--trans);
    }

    .food-card-benefit {
      display: none;
      font-size: 0.76rem;
      color: var(--text2);
      line-height: 1.7;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--divider);
      transition: color var(--trans);
    }
    .food-card.expanded .food-card-benefit { display: block; }

    /* accent bar by category */
    .food-card[data-cat="breakfast"] { border-top: 2px solid rgba(255,160,80,0.4); }
    .food-card[data-cat="lunch"]     { border-top: 2px solid rgba(80,180,255,0.4); }
    .food-card[data-cat="dinner"]    { border-top: 2px solid rgba(160,86,255,0.4); }
    .food-card[data-cat="dessert"]   { border-top: 2px solid rgba(255,110,180,0.4); }

    /* ══════════════════════════════════════
       FOOTER
    ══════════════════════════════════════ */
    footer {
      margin-top: 80px;
      text-align: center;
    }
    .footer-ornament {
      display: flex; align-items: center; justify-content: center; gap: 16px;
      margin-bottom: 16px; opacity: .35;
    }
    .footer-ornament .ornament-line { max-width: 80px; }
    .footer-text { font-size: 0.72rem; color: var(--text3); letter-spacing: 0.14em; text-transform: uppercase; }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (max-width: 640px) {
      .page { padding: 40px 16px 60px; }
      header { margin-bottom: 48px; }
      .theme-toggle { position: static; margin: 0 auto 28px; display: inline-flex; }
      header { display: flex; flex-direction: column; align-items: center; }
      .picker-grid { grid-template-columns: 1fr; }
      .all-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      .site-title { font-size: 2rem; }
    }

    /* ══════════════════════════════════════
       ANIMATION
    ══════════════════════════════════════ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeUp 0.5s ease both; }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.12s; }
    .card:nth-child(3) { animation-delay: 0.19s; }
    .card:nth-child(4) { animation-delay: 0.26s; }
  </style>
</head>
<body>

<div class="page">

  <!-- HEADER -->
  <header>
    <button class="theme-toggle" id="themeToggle" aria-label="테마 전환">
      <svg id="themeIcon" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
      <span id="themeLabel">라이트 모드</span>
    </button>

    <div class="header-ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line right"></div>
    </div>

    <h1 class="site-title">오늘 <span>뭐 먹지</span>?</h1>
    <p class="site-sub">카테고리를 선택하고 랜덤 메뉴를 추천받으세요</p>
  </header>

  <!-- PICKER -->
  <div class="section-header">
    <div class="section-dot"></div>
    <div class="section-label">Random Picker</div>
    <div class="section-header-line"></div>
  </div>
  <div class="picker-grid" id="pickerGrid"></div>

  <!-- ALL FOODS -->
  <div class="section-header">
    <div class="section-dot"></div>
    <div class="section-label">전체 메뉴</div>
    <div class="section-header-line"></div>
  </div>
  <div class="all-section">
    <div class="filter-tabs" id="filterTabs">
      <button class="tab-btn active" data-filter="all">전체</button>
      <button class="tab-btn" data-filter="breakfast">아침식사</button>
      <button class="tab-btn" data-filter="lunch">점심식사</button>
      <button class="tab-btn" data-filter="dinner">저녁식사</button>
      <button class="tab-btn" data-filter="dessert">디저트</button>
    </div>
    <div class="all-grid" id="allGrid"></div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line right"></div>
    </div>
    <p class="footer-text">카드를 클릭하면 건강 장점을 확인할 수 있습니다</p>
  </footer>

</div>

<script>
const categories = [
  {
    id: 'breakfast', title: '아침식사', icon: '🌅', desc: '하루를 활기차게 시작해요',
    items: [
      { name: '토스트',          emoji: '🍞', benefit: '소화가 빠르고 탄수화물로 아침 에너지를 빠르게 공급해요. 버터나 잼을 곁들이면 맛과 열량을 조절할 수 있어요.' },
      { name: '계란프라이',      emoji: '🍳', benefit: '완전단백질 공급원으로 포만감이 높아요. 콜린이 풍부해 뇌 기능과 집중력 향상에 도움을 줍니다.' },
      { name: '오트밀',          emoji: '🥣', benefit: '베타글루칸 식이섬유가 콜레스테롤을 낮추고 혈당 상승을 완만하게 해줘요. 오랫동안 포만감이 유지됩니다.' },
      { name: '팬케이크',        emoji: '🥞', benefit: '탄수화물과 달걀 단백질이 균형 있게 들어있어요. 꿀이나 과일을 얹으면 비타민도 함께 섭취할 수 있어요.' },
      { name: '시리얼',          emoji: '🥛', benefit: '철분·비타민·미네랄이 강화된 제품이 많아 영양 보충이 간편해요. 우유와 함께 먹으면 칼슘까지 챙길 수 있어요.' },
      { name: '죽',              emoji: '🍲', benefit: '소화 부담이 적고 위장을 편안하게 해줘요. 몸이 피곤하거나 속이 불편할 때 최고의 선택입니다.' },
      { name: '샌드위치',        emoji: '🥪', benefit: '채소·단백질·탄수화물을 한 번에 섭취할 수 있어 영양 균형이 뛰어나요. 휴대가 간편해 바쁜 아침에 딱 맞아요.' },
      { name: '베이글',          emoji: '🥯', benefit: '일반 빵보다 밀도가 높아 포만감이 오래 유지돼요. 크림치즈나 훈제연어를 곁들이면 단백질도 보충할 수 있어요.' },
      { name: '요거트',          emoji: '🫙', benefit: '유산균이 장 건강을 개선하고 면역력을 높여줘요. 칼슘이 풍부해 뼈 건강에도 매우 좋아요.' },

      { name: '양갱',       emoji: '🍡', benefit: '팥의 식이섬유와 항산화 성분이 풍부해요. 지방이 거의 없고 천연 단맛으로 칼로리 부담이 낮은 전통 건강 디저트입니다.' },
      { name: '카스텔라',   emoji: '🍰', benefit: '달걀이 듬뿍 들어가 단백질과 비타민D가 풍부해요. 촉촉하고 부드러워 소화가 잘 되고 어린이·노인 모두에게 적합해요.' },
      { name: '젤리',       emoji: '🍬', benefit: '콜라겐 성분이 피부와 관절 건강에 도움을 줄 수 있어요. 과일 맛 젤리는 비타민이 강화된 제품도 있어 간편한 영양 보충이 됩니다.' },
      { name: '식혜',       emoji: '🥤', benefit: '엿기름의 소화 효소가 식후 소화를 도와요. 천연 발효 음료로 장 건강에 좋고, 탄산음료 대신 즐기기에 훨씬 건강한 선택입니다.' },
    ]
  }
];

/* ── 다크/라이트 모드 ── */
const html  = document.documentElement;
const btn   = document.getElementById('themeToggle');
const icon  = document.getElementById('themeIcon');
const label = document.getElementById('themeLabel');

const SUN_PATH  = 'M12 3v1m0 16v1M4.22 4.22l.7.7m12.16 12.16.7.7M1 12h2m18 0h2M4.22 19.78l.7-.7M18.36 5.64l.7-.7M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7z';
const MOON_PATH = 'M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z';

setTheme(localStorage.getItem('theme') || 'dark');

btn.addEventListener('click', () => {
  setTheme(html.dataset.theme === 'dark' ? 'light' : 'dark');
});

function setTheme(t) {
  html.dataset.theme = t;
  localStorage.setItem('theme', t);
  if (t === 'dark') {
    icon.querySelector('path') ? icon.querySelector('path').setAttribute('d', MOON_PATH) : icon.innerHTML = `<path d="${MOON_PATH}"/>`;
    label.textContent = '라이트 모드';
  } else {
    icon.innerHTML = `<path d="${SUN_PATH}" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>`;
    label.textContent = '다크 모드';
  }
}

/* ── 랜덤 피커 ── */
const historyMap = {};

function pickRandom(items, cur) {
  if (items.length <= 1) return items[0];
  let n;
  do { n = items[Math.floor(Math.random() * items.length)]; } while (n.name === cur);
  return n;
}

function buildPickerCard(cat) {
  historyMap[cat.id] = [];
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.meal = cat.id;
  card.innerHTML = `
    <div class="card-header">
      <span class="card-icon">${cat.icon}</span>
      <div>
        <div class="card-title">${cat.title}</div>
        <div class="card-desc">${cat.desc}</div>
      </div>
      <span class="card-arrow">▼</span>
    </div>
    <div class="card-body">
      <div class="meal-display">
        <div class="meal-label">Recommended</div>
        <div class="meal-emoji" id="emoji-${cat.id}"></div>
        <div class="meal-name"  id="name-${cat.id}">— 선택 전 —</div>
        <div class="meal-benefit" id="benefit-${cat.id}"></div>
      </div>
      <button class="pick-btn" id="btn-${cat.id}">✦ 랜덤 선택</button>
      <div class="history" id="history-${cat.id}" style="display:none">
        <div class="history-title">Recent</div>
        <div class="history-list" id="tags-${cat.id}"></div>
      </div>
    </div>
  `;
  card.querySelector('.card-header').addEventListener('click', () => card.classList.toggle('open'));

  let cur = null;
  card.querySelector(`#btn-${cat.id}`).addEventListener('click', () => {
    const p = pickRandom(cat.items, cur);
    if (cur && cur !== p.name) {
      const h = historyMap[cat.id];
      if (!h.includes(cur)) { h.unshift(cur); if (h.length > 5) h.pop(); }
      updateHistory(cat.id);
    }
    cur = p.name;
    const ne = document.getElementById(`name-${cat.id}`);
    const ee = document.getElementById(`emoji-${cat.id}`);
    const be = document.getElementById(`benefit-${cat.id}`);
    [ne, ee, be].forEach(el => el.classList.remove('show'));
    setTimeout(() => {
      ne.textContent = p.name;
      ee.textContent = p.emoji;
      be.textContent = p.benefit;
      [ne, ee, be].forEach(el => el.classList.add('show'));
    }, 110);
  });
  return card;
}

function updateHistory(id) {
  const list = historyMap[id];
  const box  = document.getElementById(`history-${id}`);
  const tags = document.getElementById(`tags-${id}`);
  if (!list.length) { box.style.display = 'none'; return; }
  box.style.display = 'block';
  tags.innerHTML = list.map(n => `<span class="history-tag">${n}</span>`).join('');
}

const pickerGrid = document.getElementById('pickerGrid');
categories.forEach(cat => pickerGrid.appendChild(buildPickerCard(cat)));

/* ── 전체 메뉴 ── */
const catNames = { breakfast:'아침식사', lunch:'점심식사', dinner:'저녁식사', dessert:'디저트' };

function buildAllGrid(filter) {
  const g = document.getElementById('allGrid');
  g.innerHTML = '';
  categories.forEach(cat => {
    if (filter !== 'all' && filter !== cat.id) return;
    cat.items.forEach(item => {
      const fc = document.createElement('div');
      fc.className = 'food-card';
      fc.dataset.cat = cat.id;
      fc.innerHTML = `
        <div class="food-card-top">
          <span class="food-card-emoji">${item.emoji}</span>
          <div>
            <div class="food-card-name">${item.name}</div>
            <span class="food-card-cat">${catNames[cat.id]}</span>
          </div>
        </div>
        <div class="food-card-benefit">${item.benefit}</div>
      `;
      fc.addEventListener('click', () => fc.classList.toggle('expanded'));
      g.appendChild(fc);
    });
  });
}

buildAllGrid('all');

document.getElementById('filterTabs').addEventListener('click', e => {
  const b = e.target.closest('.tab-btn');
  if (!b) return;
  document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  buildAllGrid(b.dataset.filter);
});
</script>
</body>
</html>
