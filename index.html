<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘 뭐 먹지?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:       #c9a84c;
      --gold-light: #e8d5a0;
      --gold-dim:   #7a6330;
      --trans: 0.4s cubic-bezier(.4,0,.2,1);
    }
    [data-theme="dark"] {
      --bg:#0e0c0a; --bg2:#161210;
      --surface:rgba(28,24,18,.92); --surface2:rgba(36,31,23,.95);
      --border:rgba(201,168,76,.18); --border-h:rgba(201,168,76,.5);
      --text1:#f0e9d8; --text2:#a89878; --text3:#5a5040;
      --chip-bg:rgba(201,168,76,.1); --chip-color:#c9a84c;
      --divider:rgba(201,168,76,.12);
      --shadow:0 8px 40px rgba(0,0,0,.6); --shadow-h:0 20px 60px rgba(0,0,0,.75);
      --inset:rgba(0,0,0,.35); --glow:0 0 40px rgba(201,168,76,.08);
      --exclude-bg:rgba(180,40,40,.18); --exclude-border:rgba(220,80,80,.3);
      --exclude-text:#e88; --badge-bg:rgba(200,50,50,.15); --badge-color:#e08080;
    }
    [data-theme="light"] {
      --bg:#f5f0e8; --bg2:#ede6d8;
      --surface:rgba(255,252,245,.95); --surface2:rgba(252,248,240,.98);
      --border:rgba(180,145,80,.2); --border-h:rgba(180,145,80,.55);
      --text1:#1c1710; --text2:#7a6840; --text3:#b8a88a;
      --chip-bg:rgba(180,145,80,.1); --chip-color:#8a6820;
      --divider:rgba(180,145,80,.15);
      --shadow:0 6px 30px rgba(120,90,40,.12); --shadow-h:0 16px 50px rgba(120,90,40,.2);
      --inset:rgba(180,145,80,.06); --glow:0 0 40px rgba(180,145,80,.06);
      --exclude-bg:rgba(220,60,60,.08); --exclude-border:rgba(200,60,60,.25);
      --exclude-text:#c04040; --badge-bg:rgba(200,60,60,.1); --badge-color:#b03030;
    }

    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    body {
      font-family:'Noto Sans KR',sans-serif;
      background:var(--bg); color:var(--text1);
      min-height:100vh; transition:background var(--trans),color var(--trans);
      overflow-x:hidden;
    }
    body::before {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      opacity:.5;
    }
    .page { position:relative; z-index:1; max-width:1160px; margin:0 auto; padding:60px 24px 80px; }

    /* ── HEADER ── */
    header { text-align:center; margin-bottom:56px; position:relative; }
    .header-ornament { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:20px; opacity:.55; }
    .ornament-line { flex:1; max-width:120px; height:1px; background:linear-gradient(90deg,transparent,var(--gold)); }
    .ornament-line.right { background:linear-gradient(90deg,var(--gold),transparent); }
    .ornament-diamond { width:6px; height:6px; background:var(--gold); transform:rotate(45deg); }
    .site-title { font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,5vw,3.4rem); font-weight:700; letter-spacing:.04em; color:var(--text1); transition:color var(--trans); }
    .site-title span { background:linear-gradient(135deg,var(--gold-light),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .site-sub { margin-top:14px; font-size:.88rem; color:var(--text2); letter-spacing:.12em; text-transform:uppercase; font-weight:300; transition:color var(--trans); }
    .theme-toggle {
      position:absolute; top:0; right:0;
      display:flex; align-items:center; gap:7px;
      padding:8px 18px; border-radius:40px;
      border:1px solid var(--border); background:var(--surface);
      color:var(--text2); font-size:.78rem; font-family:'Noto Sans KR',sans-serif;
      font-weight:500; letter-spacing:.06em; cursor:pointer;
      transition:border-color .2s,color .2s,background var(--trans); backdrop-filter:blur(12px);
    }
    .theme-toggle:hover { border-color:var(--gold); color:var(--gold); }
    .theme-toggle svg { width:14px; height:14px; fill:currentColor; flex-shrink:0; }

    /* ── SECTION HEADER ── */
    .section-header { display:flex; align-items:center; gap:16px; margin-bottom:28px; }
    .section-header-line { flex:1; height:1px; background:var(--divider); }
    .section-label { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:var(--gold); }
    .section-dot { width:4px; height:4px; background:var(--gold); border-radius:50%; opacity:.6; }

    /* ══════════════════════════════════════
       ALLERGEN FILTER PANEL
    ══════════════════════════════════════ */
    .allergen-panel {
      background:var(--surface); border:1px solid var(--border);
      border-radius:18px; margin-bottom:48px; overflow:hidden;
      box-shadow:var(--shadow); backdrop-filter:blur(16px);
      transition:background var(--trans);
    }
    .allergen-toggle {
      width:100%; padding:18px 24px;
      display:flex; align-items:center; gap:14px;
      cursor:pointer; user-select:none; background:none; border:none;
      color:var(--text1); font-family:'Noto Sans KR',sans-serif;
      transition:background .2s;
    }
    .allergen-toggle:hover { background:var(--inset); }
    .allergen-toggle-icon { font-size:1.3rem; }
    .allergen-toggle-text { font-size:1rem; font-weight:700; color:var(--text1); }
    .allergen-toggle-sub { font-size:.78rem; color:var(--text2); margin-left:4px; font-weight:400; }
    .allergen-toggle-arrow { margin-left:auto; color:var(--text3); font-size:.7rem; letter-spacing:.1em; transition:transform .3s,color .2s; }
    .allergen-panel.open .allergen-toggle-arrow { transform:rotate(180deg); color:var(--gold); }
    .allergen-badge-count {
      background:var(--exclude-bg); border:1px solid var(--exclude-border);
      color:var(--exclude-text); font-size:.72rem; font-weight:700;
      padding:2px 10px; border-radius:20px; margin-left:6px;
      display:none; letter-spacing:.04em;
    }
    .allergen-badge-count.visible { display:inline-block; }

    .allergen-body { display:none; padding:0 24px 24px; border-top:1px solid var(--divider); }
    .allergen-panel.open .allergen-body { display:block; }

    .allergen-body-label { font-size:.7rem; color:var(--text3); letter-spacing:.16em; text-transform:uppercase; margin:18px 0 12px; }
    .allergen-chips { display:flex; flex-wrap:wrap; gap:9px; }
    .allergen-chip {
      display:flex; align-items:center; gap:6px;
      padding:7px 14px; border-radius:30px;
      border:1px solid var(--border); background:transparent;
      color:var(--text2); font-size:.8rem; font-family:'Noto Sans KR',sans-serif;
      font-weight:500; cursor:pointer; letter-spacing:.04em;
      transition:border-color .18s,background .18s,color .18s;
      user-select:none;
    }
    .allergen-chip:hover { border-color:var(--border-h); color:var(--text1); }
    .allergen-chip.selected {
      background:var(--exclude-bg); border-color:var(--exclude-border);
      color:var(--exclude-text);
    }
    .allergen-chip-icon { font-size:1rem; }
    .allergen-reset {
      margin-top:16px; padding:8px 20px;
      border-radius:30px; border:1px solid var(--border);
      background:transparent; color:var(--text3);
      font-size:.75rem; font-family:'Noto Sans KR',sans-serif;
      cursor:pointer; letter-spacing:.06em; transition:border-color .2s,color .2s;
    }
    .allergen-reset:hover { border-color:var(--gold); color:var(--gold); }

    /* ── PICKER CARDS ── */
    .picker-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(255px,1fr)); gap:20px; margin-bottom:80px; }
    .card {
      background:var(--surface); border:1px solid var(--border); border-radius:18px;
      overflow:hidden; box-shadow:var(--shadow),var(--glow);
      transition:transform .25s,box-shadow .25s,border-color .25s,background var(--trans);
      backdrop-filter:blur(16px); animation:fadeUp .5s ease both;
    }
    .card:nth-child(1){animation-delay:.05s} .card:nth-child(2){animation-delay:.12s}
    .card:nth-child(3){animation-delay:.19s} .card:nth-child(4){animation-delay:.26s}
    .card:hover { transform:translateY(-5px); box-shadow:var(--shadow-h),var(--glow); border-color:var(--border-h); }
    .card-header {
      padding:22px 24px; cursor:pointer; display:flex; align-items:center; gap:16px;
      user-select:none; border-bottom:1px solid transparent;
      transition:border-color .25s,background .25s; background:var(--inset);
    }
    .card.open .card-header { border-color:var(--divider); }
    .card-icon { font-size:2rem; line-height:1; }
    .card-title { font-family:'Cormorant Garamond',serif; font-size:1.22rem; font-weight:700; letter-spacing:.03em; color:var(--gold); }
    .card-desc { font-size:.75rem; color:var(--text2); margin-top:2px; letter-spacing:.04em; font-weight:300; }
    .card-available { font-size:.7rem; color:var(--text3); margin-top:3px; transition:color .2s; }
    .card-available.low { color:var(--exclude-text); }
    .card-arrow { margin-left:auto; color:var(--text3); font-size:.7rem; letter-spacing:.1em; transition:transform .3s,color .2s; }
    .card.open .card-arrow { transform:rotate(180deg); color:var(--gold); }
    .card-body { display:none; padding:22px 24px 24px; }
    .card.open .card-body { display:block; }

    .meal-display {
      background:var(--inset); border:1px solid var(--divider); border-radius:12px;
      padding:22px 16px; text-align:center; margin-bottom:16px; min-height:140px;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      transition:background var(--trans);
    }
    .meal-label { font-size:.65rem; color:var(--text3); letter-spacing:.22em; text-transform:uppercase; margin-bottom:10px; font-weight:500; }
    .meal-emoji { font-size:2.4rem; margin-bottom:6px; opacity:0; transition:opacity .35s .08s; }
    .meal-emoji.show { opacity:1; }
    .meal-name { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:700; color:var(--text1); opacity:0; transform:translateY(6px); transition:opacity .3s,transform .3s,color var(--trans); letter-spacing:.02em; }
    .meal-name.show { opacity:1; transform:translateY(0); }
    .meal-benefit { font-size:.78rem; color:var(--text2); margin-top:10px; line-height:1.65; opacity:0; max-height:0; overflow:hidden; transition:opacity .4s .18s,max-height .4s,color var(--trans); padding:0 4px; }
    .meal-benefit.show { opacity:1; max-height:120px; }
    .meal-allergens { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin-top:10px; opacity:0; max-height:0; overflow:hidden; transition:opacity .4s .22s,max-height .4s; }
    .meal-allergens.show { opacity:1; max-height:60px; }
    .allergen-tag { font-size:.65rem; padding:2px 8px; border-radius:20px; background:var(--badge-bg); color:var(--badge-color); border:1px solid var(--exclude-border); }

    .pick-btn {
      width:100%; padding:13px; border-radius:10px;
      border:1px solid var(--gold-dim);
      background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.05));
      color:var(--gold-light); font-family:'Noto Sans KR',sans-serif;
      font-size:.88rem; font-weight:500; letter-spacing:.14em; cursor:pointer;
      transition:background .2s,border-color .2s,transform .1s,color .2s,opacity .2s;
    }
    .pick-btn:hover { background:linear-gradient(135deg,rgba(201,168,76,.28),rgba(201,168,76,.12)); border-color:var(--gold); }
    .pick-btn:active { transform:scale(.98); }
    .pick-btn:disabled { opacity:.35; cursor:not-allowed; }

    .history { margin-top:16px; }
    .history-title { font-size:.65rem; color:var(--text3); letter-spacing:.18em; text-transform:uppercase; margin-bottom:8px; }
    .history-list { display:flex; flex-wrap:wrap; gap:6px; }
    .history-tag { background:var(--chip-bg); color:var(--chip-color); border:1px solid var(--border); font-size:.72rem; padding:3px 10px; border-radius:20px; letter-spacing:.04em; transition:background var(--trans),color var(--trans),border-color var(--trans); }

    /* ── ALL FOOD ── */
    .filter-tabs { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:28px; }
    .tab-btn { padding:8px 22px; border-radius:40px; border:1px solid var(--border); background:transparent; color:var(--text2); font-family:'Noto Sans KR',sans-serif; font-size:.8rem; font-weight:500; letter-spacing:.08em; cursor:pointer; transition:border-color .2s,color .2s,background .2s; }
    .tab-btn:hover { border-color:var(--gold); color:var(--gold); }
    .tab-btn.active { border-color:var(--gold); background:var(--chip-bg); color:var(--gold); }

    .all-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:14px; }

    .food-card {
      background:var(--surface); border:1px solid var(--border); border-radius:14px;
      padding:16px; cursor:pointer;
      transition:transform .2s,border-color .2s,box-shadow .2s,background var(--trans),opacity .3s;
      backdrop-filter:blur(12px);
    }
    .food-card:hover { transform:translateY(-3px); border-color:var(--border-h); box-shadow:var(--shadow-h); }
    .food-card.excluded { opacity:.35; filter:grayscale(.6); pointer-events:none; }
    .food-card[data-cat="breakfast"] { border-top:2px solid rgba(255,160,80,.4); }
    .food-card[data-cat="lunch"]     { border-top:2px solid rgba(80,180,255,.4); }
    .food-card[data-cat="dinner"]    { border-top:2px solid rgba(160,86,255,.4); }
    .food-card[data-cat="dessert"]   { border-top:2px solid rgba(255,110,180,.4); }

    .food-card-top { display:flex; align-items:center; gap:12px; }
    .food-card-emoji { font-size:1.9rem; line-height:1; flex-shrink:0; }
    .food-card-name { font-family:'Cormorant Garamond',serif; font-size:1.08rem; font-weight:700; color:var(--text1); letter-spacing:.02em; transition:color var(--trans); }
    .food-card-cat { display:inline-block; font-size:.65rem; font-weight:500; letter-spacing:.1em; padding:2px 9px; border-radius:20px; margin-top:4px; background:var(--chip-bg); color:var(--chip-color); border:1px solid var(--border); transition:background var(--trans),color var(--trans); }
    .food-card-allergen-list { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
    .food-allergen-tag { font-size:.62rem; padding:1px 7px; border-radius:10px; background:var(--badge-bg); color:var(--badge-color); border:1px solid var(--exclude-border); }
    .food-card-benefit { display:none; font-size:.76rem; color:var(--text2); line-height:1.7; margin-top:12px; padding-top:12px; border-top:1px solid var(--divider); transition:color var(--trans); }
    .food-card.expanded .food-card-benefit { display:block; }

    /* ── FOOTER ── */
    footer { margin-top:80px; text-align:center; }
    .footer-ornament { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:16px; opacity:.35; }
    .footer-ornament .ornament-line { max-width:80px; }
    .footer-text { font-size:.72rem; color:var(--text3); letter-spacing:.14em; text-transform:uppercase; }

    @media(max-width:640px){
      .page{padding:40px 16px 60px} header{margin-bottom:48px}
      .theme-toggle{position:static;margin:0 auto 28px;display:inline-flex}
      header{display:flex;flex-direction:column;align-items:center}
      .picker-grid{grid-template-columns:1fr}
      .all-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
      .allergen-chips{gap:7px}
      .allergen-chip{font-size:.75rem;padding:6px 11px}
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div class="page">

  <header>
    <button class="theme-toggle" id="themeToggle">
      <svg id="themeIcon" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
      <span id="themeLabel">라이트 모드</span>
    </button>
    <div class="header-ornament">
      <div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line right"></div>
    </div>
    <h1 class="site-title">오늘 <span>뭐 먹지</span>?</h1>
    <p class="site-sub">카테고리를 선택하고 랜덤 메뉴를 추천받으세요</p>
  </header>

  <!-- ALLERGEN FILTER -->
  <div class="section-header">
    <div class="section-dot"></div>
    <div class="section-label">Allergen Filter</div>
    <div class="section-header-line"></div>
  </div>
  <div class="allergen-panel" id="allergenPanel">
    <button class="allergen-toggle" id="allergenToggle">
      <span class="allergen-toggle-icon">⚠️</span>
      <span class="allergen-toggle-text">알레르기 성분 설정</span>
      <span class="allergen-toggle-sub">— 해당 성분 포함 메뉴를 자동으로 제외합니다</span>
      <span class="allergen-badge-count" id="allergenCount"></span>
      <span class="allergen-toggle-arrow">▼</span>
    </button>
    <div class="allergen-body" id="allergenBody">
      <div class="allergen-body-label">알레르기 유발 성분 선택</div>
      <div class="allergen-chips" id="allergenChips"></div>
      <button class="allergen-reset" id="allergenReset">✕ 선택 초기화</button>
    </div>
  </div>

  <!-- PICKER -->
  <div class="section-header">
    <div class="section-dot"></div>
    <div class="section-label">Random Picker</div>
    <div class="section-header-line"></div>
  </div>
  <div class="picker-grid" id="pickerGrid"></div>

  <!-- ALL FOODS -->
  <div class="section-header">
    <div class="section-dot"></div>
    <div class="section-label">전체 메뉴</div>
    <div class="section-header-line"></div>
  </div>
  <div class="filter-tabs" id="filterTabs">
    <button class="tab-btn active" data-filter="all">전체</button>
    <button class="tab-btn" data-filter="breakfast">아침식사</button>
    <button class="tab-btn" data-filter="lunch">점심식사</button>
    <button class="tab-btn" data-filter="dinner">저녁식사</button>
    <button class="tab-btn" data-filter="dessert">디저트</button>
  </div>
  <div class="all-grid" id="allGrid"></div>

  <footer>
    <div class="footer-ornament">
      <div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line right"></div>
    </div>
    <p class="footer-text">카드를 클릭하면 건강 장점을 확인할 수 있습니다</p>
  </footer>
</div>

<script>
/* ══════════════════════════════════════
   ALLERGEN DEFINITIONS
══════════════════════════════════════ */
const ALLERGENS = [
  { id:'egg',       label:'난류',     icon:'🥚' },
  { id:'dairy',     label:'우유·유제품', icon:'🥛' },
  { id:'wheat',     label:'밀·글루텐', icon:'🌾' },
  { id:'soy',       label:'대두',     icon:'🫘' },
  { id:'peanut',    label:'땅콩',     icon:'🥜' },
  { id:'nut',       label:'견과류',   icon:'🌰' },
  { id:'shrimp',    label:'새우',     icon:'🦐' },
  { id:'crab',      label:'게',       icon:'🦀' },
  { id:'squid',     label:'오징어·낙지', icon:'🦑' },
  { id:'fish',      label:'생선',     icon:'🐟' },
  { id:'pork',      label:'돼지고기', icon:'🐷' },
  { id:'beef',      label:'쇠고기',   icon:'🐄' },
  { id:'chicken',   label:'닭고기',   icon:'🐔' },
  { id:'shellfish', label:'조개류·전복', icon:'🐚' },
  { id:'buckwheat', label:'메밀',     icon:'🌿' },
];

/* ══════════════════════════════════════
   FOOD DATA  (allergens: string[])
══════════════════════════════════════ */
const categories = [
  {
    id:'breakfast', title:'아침식사', icon:'🌅', desc:'하루를 활기차게 시작해요',

/* ══════════════════════════════════════
   ALLERGEN FILTER STATE
══════════════════════════════════════ */
const selectedAllergens = new Set(JSON.parse(localStorage.getItem('allergens') || '[]'));

function saveAllergens() {
  localStorage.setItem('allergens', JSON.stringify([...selectedAllergens]));
}

function isExcluded(item) {
  if (!selectedAllergens.size) return false;
  return item.allergens.some(a => selectedAllergens.has(a));
}

/* ── allergen panel toggle ── */
const panel = document.getElementById('allergenPanel');
document.getElementById('allergenToggle').addEventListener('click', () => {
  panel.classList.toggle('open');
});

/* ── build allergen chips ── */
const chipsEl = document.getElementById('allergenChips');
ALLERGENS.forEach(a => {
  const chip = document.createElement('button');
  chip.className = 'allergen-chip' + (selectedAllergens.has(a.id) ? ' selected' : '');
  chip.dataset.id = a.id;
  chip.innerHTML = `<span class="allergen-chip-icon">${a.icon}</span>${a.label}`;
  chip.addEventListener('click', () => {
    if (selectedAllergens.has(a.id)) { selectedAllergens.delete(a.id); chip.classList.remove('selected'); }
    else                             { selectedAllergens.add(a.id);    chip.classList.add('selected'); }
    saveAllergens();
    updateAll();
  });
  chipsEl.appendChild(chip);
});

document.getElementById('allergenReset').addEventListener('click', () => {
  selectedAllergens.clear();
  chipsEl.querySelectorAll('.allergen-chip').forEach(c => c.classList.remove('selected'));
  saveAllergens();
  updateAll();
});

function updateAllergenBadge() {
  const badge = document.getElementById('allergenCount');
  if (selectedAllergens.size) {
    badge.textContent = `${selectedAllergens.size}개 성분 제외 중`;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

  localStorage.setItem('theme', t);

    (tIcon.querySelector('path') || tIcon.appendChild(document.createElementNS('http://www.w3.org/2000/svg','path'))).setAttribute('d', MOON);

  } else {
    tIcon.innerHTML = `<path d="${SUN}" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>`;
    tLbl.textContent = '다크 모드';
  }
}

/* ══════════════════════════════════════
   RANDOM PICKER
══════════════════════════════════════ */
const historyMap = {};
const catNames = { breakfast:'아침식사', lunch:'점심식사', dinner:'저녁식사', dessert:'디저트' };
const allergenLabels = Object.fromEntries(ALLERGENS.map(a => [a.id, a.label]));

function pickRandom(items, cur) {
  const pool = items.filter(i => !isExcluded(i));
  if (!pool.length) return null;
  if (pool.length === 1) return pool[0];
  let n;
  do { n = pool[Math.floor(Math.random() * pool.length)]; } while (n.name === cur);
  return n;
}

function buildPickerCard(cat) {
  historyMap[cat.id] = [];
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.meal = cat.id;
  card.innerHTML = `
    <div class="card-header">
      <span class="card-icon">${cat.icon}</span>
      <div>
        <div class="card-title">${cat.title}</div>
        <div class="card-desc">${cat.desc}</div>
        <div class="card-available" id="avail-${cat.id}"></div>
      </div>
      <span class="card-arrow">▼</span>
    </div>
    <div class="card-body">
      <div class="meal-display">
        <div class="meal-label">Recommended</div>
        <div class="meal-emoji"   id="emoji-${cat.id}"></div>
        <div class="meal-name"    id="name-${cat.id}">— 선택 전 —</div>
        <div class="meal-benefit" id="benefit-${cat.id}"></div>
        <div class="meal-allergens" id="mal-${cat.id}"></div>
      </div>
      <button class="pick-btn" id="btn-${cat.id}">✦ 랜덤 선택</button>
      <div class="history" id="history-${cat.id}" style="display:none">
        <div class="history-title">Recent</div>
        <div class="history-list" id="tags-${cat.id}"></div>
      </div>
    </div>
  `;
  card.querySelector('.card-header').addEventListener('click', () => card.classList.toggle('open'));

  let cur = null;
  const pickBtn = card.querySelector(`#btn-${cat.id}`);
  pickBtn.addEventListener('click', () => {
    const p = pickRandom(cat.items, cur);
    if (!p) return;
    if (cur && cur !== p.name) {
      const h = historyMap[cat.id];
      if (!h.includes(cur)) { h.unshift(cur); if (h.length > 5) h.pop(); }
      updateHistory(cat.id);
    }
    cur = p.name;
    const ne = document.getElementById(`name-${cat.id}`);
    const ee = document.getElementById(`emoji-${cat.id}`);
    const be = document.getElementById(`benefit-${cat.id}`);
    const ma = document.getElementById(`mal-${cat.id}`);
    [ne, ee, be, ma].forEach(el => el.classList.remove('show'));
    setTimeout(() => {
      ne.textContent = p.name;
      ee.textContent = p.emoji;
      be.textContent = p.benefit;
      ma.innerHTML = p.allergens.length
        ? p.allergens.map(a => `<span class="allergen-tag">${allergenLabels[a]||a}</span>`).join('')
        : '';
      [ne, ee, be].forEach(el => el.classList.add('show'));
      if (p.allergens.length) ma.classList.add('show');
    }, 110);
  });

  return card;
}

function updateHistory(id) {
  const list = historyMap[id];
  const box  = document.getElementById(`history-${id}`);
  const tags = document.getElementById(`tags-${id}`);
  if (!list.length) { box.style.display = 'none'; return; }
  box.style.display = 'block';
  tags.innerHTML = list.map(n => `<span class="history-tag">${n}</span>`).join('');
}

function updatePickerAvailability() {
  categories.forEach(cat => {
    const pool = cat.items.filter(i => !isExcluded(i));
    const avail = document.getElementById(`avail-${cat.id}`);
    const btn   = document.getElementById(`btn-${cat.id}`);
    if (!avail) return;
    if (selectedAllergens.size) {
      avail.textContent = `${pool.length} / ${cat.items.length}개 선택 가능`;
      avail.className = 'card-available' + (pool.length < 3 ? ' low' : '');
      if (btn) btn.disabled = pool.length === 0;
    } else {
      avail.textContent = '';
      if (btn) btn.disabled = false;
    }
  });
}

const pickerGrid = document.getElementById('pickerGrid');
categories.forEach(cat => pickerGrid.appendChild(buildPickerCard(cat)));

/* ══════════════════════════════════════
   ALL FOOD GRID
══════════════════════════════════════ */
let currentFilter = 'all';

function buildAllGrid(filter) {
  currentFilter = filter;
  const g = document.getElementById('allGrid');
  g.innerHTML = '';
  categories.forEach(cat => {
    if (filter !== 'all' && filter !== cat.id) return;
    cat.items.forEach(item => {
      const fc = document.createElement('div');
      fc.className = 'food-card' + (isExcluded(item) ? ' excluded' : '');
      fc.dataset.cat = cat.id;
      const allergenTags = item.allergens.length
        ? `<div class="food-card-allergen-list">${item.allergens.map(a=>`<span class="food-allergen-tag">${allergenLabels[a]||a}</span>`).join('')}</div>`
        : '';
      fc.innerHTML = `
        <div class="food-card-top">
          <span class="food-card-emoji">${item.emoji}</span>
          <div>
            <div class="food-card-name">${item.name}</div>
            <span class="food-card-cat">${catNames[cat.id]}</span>
            ${allergenTags}
          </div>
        </div>
        <div class="food-card-benefit">${item.benefit}</div>
      `;
      if (!isExcluded(item)) fc.addEventListener('click', () => fc.classList.toggle('expanded'));
      g.appendChild(fc);
    });
  });
}

document.getElementById('filterTabs').addEventListener('click', e => {
  const b = e.target.closest('.tab-btn');
  if (!b) return;
  document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  buildAllGrid(b.dataset.filter);
});

/* ══════════════════════════════════════
   UPDATE ALL (called when allergen changes)
══════════════════════════════════════ */
function updateAll() {
  updateAllergenBadge();
  updatePickerAvailability();
  buildAllGrid(currentFilter);
}

updateAll();
</script>
</body>
